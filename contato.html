<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato - Meu Portfólio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="transition-overlay" id="transition-overlay">
      <div class="loader"></div>
    </div>
    <div id="nav-placeholder"></div>

<section id="contato" class="hidden">
      <h2>Vamos conversar?</h2>
      <p>Acesse meu currículo completo ou mande uma mensagem.</p>
      <div class="contact-links">
        <a href="curriculo.pdf" target="_blank" class="btn btn-outline">Baixar Currículo (PDF)</a>
        <!--<a href="#" class="btn btn-outline">Meu Lattes</a>-->
      </div>

      <form
        id="contact-form"
        class="contact-form"
        action="https://formspree.io/f/xdarvzwk"
        method="POST"
      >
        <input type="text" name="name" placeholder="Seu nome" required />
        <input type="email" name="email" placeholder="Seu e-mail" required />
        <textarea
          name="message"
          rows="5"
          placeholder="Sua mensagem"
          required
        ></textarea>
        <button type="submit" class="btn">Enviar Mensagem</button>
        <p id="form-status"></p>
      </form>
    </section>

    <script src="script.js"></script>
    <script>
      const form = document.getElementById("contact-form");
      const status = document.getElementById("form-status");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        status.textContent = "Enviando...";

        try {
          const response = await fetch(form.action, {
            method: "POST",
            body: new FormData(form),
            headers: { Accept: "application/json" },
          });

          if (response.ok) {
            status.textContent = "Mensagem enviada com sucesso! Obrigado pelo contato.";
            form.reset();
          } else {
            status.textContent = "Ops, algo deu errado. Tenta de novo ou usa o e-mail direto: dennis.gon.dias@gmail.com";
          }
        } catch (error) {
          status.textContent = "Erro de conexão. Tenta de novo ou usa o e-mail direto: dennis.gon.dias@gmail.com";
        }
      });
    </script>
  </body>
</html>
